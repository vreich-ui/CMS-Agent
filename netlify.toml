[build]
  command = "npm install --no-fund --no-audit && npm --prefix ui install --no-fund --no-audit && npm run ui:build"
  publish = "ui/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/agent"
  to = "/.netlify/functions/agent"
  status = 200

[[redirects]]
  from = "/api/mcp"
  to = "/.netlify/functions/mcp"
  status = 200


[[redirects]]
  from = "/api/session"
  to = "/.netlify/functions/session"
  status = 200

[[redirects]]
  from = "/api/workspace-mcp"
  to = "/.netlify/functions/workspace-mcp"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
